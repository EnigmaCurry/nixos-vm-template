# RetroArch config for the moonshine-nvidia profile.
#
# The moonshine-retroarch-launch wrapper copies this file over
# ~/.config/retroarch/retroarch.cfg on every launch, so RetroArch always
# starts from a known state. config_save_on_exit = false keeps RetroArch
# from writing over it on quit.
#
# To iterate on values without a full rebuild:
#   ssh user@HOST touch ~/.config/retroarch/.no-reset
# then scp edits of this file to ~/.config/retroarch/retroarch.cfg and
# relaunch the RetroArch tile — the wrapper skips its reset when the
# marker file exists. Remove the marker to restore declarative behavior.
# When happy, paste changes into this file and `just upgrade`.

config_save_on_exit = "false"
video_fullscreen = "true"
video_windowed_fullscreen = "true"
