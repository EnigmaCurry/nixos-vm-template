labels:
  backend: local

timeout: 30

when:
  - event: push
    branch: dev
  - event: manual

steps:
  - name: build
    image: bash
    commands:
      - source backends/common.sh && build_profile core
      - source backends/common.sh && export_profile core
      - ls -lh output/export/

  - name: upload
    image: bash
    environment:
      RCLONE_CONFIG_REMOTE_TYPE:
        from_secret: rclone_type
      RCLONE_CONFIG_REMOTE_PROVIDER:
        from_secret: rclone_provider
      RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID:
        from_secret: rclone_access_key_id
      RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY:
        from_secret: rclone_secret_access_key
      RCLONE_CONFIG_REMOTE_ENDPOINT:
        from_secret: rclone_endpoint
      RCLONE_CONFIG_REMOTE_REGION:
        from_secret: rclone_region
      RCLONE_CONFIG_REMOTE_ACL: public-read
      S3_BUCKET:
        from_secret: s3_bucket
      S3_PUBLIC_URL:
        from_secret: s3_public_url
    commands:
      - |
        rclone() { nix run nixpkgs#rclone -- "$@"; }
        jq() { nix run nixpkgs#jq -- "$@"; }
        # Clean up stale multipart uploads from previous failed runs
        rclone cleanup "remote:$S3_BUCKET/" -v || true
        # Delete old images for the same profile
        for f in output/export/nixos-*.qcow2; do
          fname=$(basename "$f" .qcow2)
          profile_prefix="${fname%-*}"    # strip -SHA
          profile_prefix="${profile_prefix%-*}"  # strip -YYYYMMDD
          rclone delete "remote:$S3_BUCKET/" --include "${profile_prefix}-*.qcow2" -v
        done
        # Upload new images
        rclone copy output/export/ "remote:$S3_BUCKET/" --include '*.qcow2' -v
        # Build manifest from existing entries + newly uploaded images
        rclone copy "remote:$S3_BUCKET/manifest.json" /tmp/manifest/ 2>/dev/null || true
        manifest='{"profiles":{}}'
        if [ -f /tmp/manifest/manifest.json ]; then
          manifest=$(cat /tmp/manifest/manifest.json)
        fi
        # List actual files in bucket to prune stale manifest entries
        bucket_files=$(rclone lsf "remote:$S3_BUCKET/" --include 'nixos-*.qcow2')
        for key in $(echo "$manifest" | jq -r '.profiles | keys[]'); do
          entry_filename=$(echo "$manifest" | jq -r --arg k "$key" '.profiles[$k].filename')
          if ! echo "$bucket_files" | grep -qxF "$entry_filename"; then
            manifest=$(echo "$manifest" | jq --arg k "$key" 'del(.profiles[$k])')
          fi
        done
        # Add entries for newly uploaded images
        for f in output/export/nixos-*.qcow2; do
          filename=$(basename "$f")
          slug="${filename%.qcow2}"
          slug="${slug%-*}"    # strip -SHA
          slug="${slug%-*}"    # strip -YYYYMMDD
          slug="${slug#nixos-}" # strip nixos- prefix
          profile_key=$(echo "$slug" | tr '-' ',')
          date_stamp=$(echo "$filename" | grep -o '[0-9]\{8\}')
          git_sha=$(echo "$filename" | sed 's/.*-\([a-f0-9]*\)\.qcow2$/\1/')
          sha256=$(sha256sum "$f" | cut -d' ' -f1)
          url="${S3_PUBLIC_URL%/}/${filename}"
          manifest=$(echo "$manifest" | jq \
            --arg key "$profile_key" \
            --arg url "$url" \
            --arg filename "$filename" \
            --arg date "$date_stamp" \
            --arg commit "$git_sha" \
            --arg sha256 "$sha256" \
            '.profiles[$key] = {url: $url, filename: $filename, date: $date, commit: $commit, sha256: $sha256}')
        done
        echo "$manifest" | jq . > /tmp/manifest.json
        echo "Manifest:"
        cat /tmp/manifest.json
        rclone copyto /tmp/manifest.json "remote:$S3_BUCKET/manifest.json" --s3-no-check-bucket -v
