labels:
  backend: local

when:
  - event: push
    branch: master
  - event: manual
  - event: cron

steps:
  - name: gc
    image: bash
    commands:
      - bash ci/nix-gc.sh

  - name: update
    image: bash
    commands:
      - bash ci/flake-update.sh

  - name: build
    image: bash
    environment:
      OUTPUT_DIR: /var/lib/woodpecker/output
    commands:
      # Output lives outside the ephemeral workspace (which is on a small
      # /tmp tmpfs), so clean stale qcow2s from prior runs before exporting.
      - rm -rf "$OUTPUT_DIR/export"
      - source backends/common.sh && build_profile core
      - source backends/common.sh && export_profile core
      - source backends/common.sh && build_profile step-ca
      - source backends/common.sh && export_profile step-ca
      - source backends/common.sh && build_profile woodpecker,docker
      - source backends/common.sh && export_profile woodpecker,docker
      - source backends/common.sh && build_profile semi-mutable,woodpecker
      - source backends/common.sh && export_profile semi-mutable,woodpecker
      - source backends/common.sh && build_profile mutable
      - source backends/common.sh && export_profile mutable
      - source backends/common.sh && build_profile podman,nifty-services
      - source backends/common.sh && export_profile podman,nifty-services
      - ls -lh "$OUTPUT_DIR/export/"

  - name: upload
    image: bash
    environment:
      RCLONE_CONFIG_REMOTE_TYPE:
        from_secret: rclone_type
      RCLONE_CONFIG_REMOTE_PROVIDER:
        from_secret: rclone_provider
      RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID:
        from_secret: rclone_access_key_id
      RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY:
        from_secret: rclone_secret_access_key
      RCLONE_CONFIG_REMOTE_ENDPOINT:
        from_secret: rclone_endpoint
      RCLONE_CONFIG_REMOTE_REGION:
        from_secret: rclone_region
      RCLONE_CONFIG_REMOTE_ACL: public-read
      OUTPUT_DIR: /var/lib/woodpecker/output
      S3_BUCKET:
        from_secret: s3_bucket
      S3_PUBLIC_URL:
        from_secret: s3_public_url
    commands:
      - bash ci/upload.sh

  - name: push
    image: bash
    commands:
      - bash ci/push-if-changed.sh
