when:
  branch: master
  event: push

steps:
  - name: build
    commands:
      - nix build .#core --out-link result
      - ls -lh result/nixos.qcow2

  - name: export
    commands:
      - source backends/common.sh && export_profile core
      - ls -lh output/export/

  - name: upload
    environment:
      RCLONE_CONFIG_REMOTE_TYPE:
        from_secret: rclone_type
      RCLONE_CONFIG_REMOTE_PROVIDER:
        from_secret: rclone_provider
      RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID:
        from_secret: rclone_access_key_id
      RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY:
        from_secret: rclone_secret_access_key
      RCLONE_CONFIG_REMOTE_ENDPOINT:
        from_secret: rclone_endpoint
      RCLONE_CONFIG_REMOTE_REGION:
        from_secret: rclone_region
      S3_BUCKET:
        from_secret: s3_bucket
    commands:
      - nix-shell -p rclone --run "rclone copy output/export/ remote:$S3_BUCKET/ --include '*.qcow2' -v"
